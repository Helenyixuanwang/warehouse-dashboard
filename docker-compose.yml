version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: warehouse-redis
    ports:
      - '6379:6379'

  postgres:
    image: postgres:16-alpine
    container_name: warehouse-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse123
      POSTGRES_DB: warehouse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: warehouse-backend
    ports:
      - '3001:3001'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=warehouse
      - DB_PASSWORD=warehouse123
      - DB_NAME=warehouse_db
    depends_on:
      - redis
      - postgres

  frontend:
    build: ./frontend
    container_name: warehouse-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:  # persists data even if container restarts